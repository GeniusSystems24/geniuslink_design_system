<script type="text/babel">
const { GLIcon, DSButton, DSSpinner, DSPill, Shell, Section, Spec } = window;
const { useState, useRef, useEffect, useLayoutEffect, useCallback, useMemo } = React;

/* ── shared utilities ───────────────────────────────────────────── */
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const hStep = (isRight, rtl) => (isRight ? 1 : -1) * (rtl ? -1 : 1);
const san = s => String(s).replace(/\t/g, ' ').replace(/[\r\n]+/g, ' ');
const TT = { Asset:'#4A7CFF', Liability:'#E0A23B', Equity:'#1DB88A', Revenue:'#1DB88A', Expense:'#EF4444' };
const ST = { Reconciled:'#1DB88A', Active:'#1DB88A', Pending:'#E0A23B', Open:'#E0A23B', Flagged:'#EF4444', Review:'#8C92A4' };
const move = (arr, from, to) => { const a = arr.slice(); const [x] = a.splice(from, 1); a.splice(to, 0, x); return a; };
const MINW = 60, MAXW = 460;

function Seg({ value, onChange, options }) {
  return (
    <div style={{ display:'inline-flex', gap:3, background:'var(--gl-input-bg)', padding:3, borderRadius:7, border:'1px solid var(--gl-border)' }}>
      {options.map(o => {
        const v = typeof o === 'string' ? o : o.value, l = typeof o === 'string' ? o : o.label, on = value === v;
        return <button key={v} type="button" onClick={() => onChange(v)}
          style={{ padding:'5px 12px', borderRadius:5, background:on?'var(--gl-surface)':'transparent', color:on?'var(--gl-fg-1)':'var(--gl-fg-3)', border:'none', cursor:'pointer', fontFamily:'var(--gl-font-body)', fontWeight:700, fontSize:11, letterSpacing:'.08em', textTransform:'uppercase' }}>{l}</button>;
      })}
    </div>
  );
}
function Kbd({ children }) {
  return <span style={{ display:'inline-flex', alignItems:'center', justifyContent:'center', minWidth:22, height:22, padding:'0 6px', borderRadius:5, background:'var(--gl-input-bg)', border:'1px solid var(--gl-border-strong)', borderBottomWidth:2, fontFamily:'var(--gl-font-mono)', fontSize:11.5, fontWeight:600, color:'var(--gl-fg-1)' }}>{children}</span>;
}
function useKeyLog() {
  const [log, setLog] = useState([]);
  const push = useCallback(function(key, action, ok) {
    if (ok === undefined) ok = true;
    setLog(l => [{ id: Date.now() + Math.random(), key, action, ok }, ...l].slice(0, 7));
  }, []);
  return [log, push];
}
function KeyLog({ log, hint }) {
  return (
    <div dir="ltr" style={{ background:'var(--gl-bg)', border:'1px solid var(--gl-border)', borderRadius:'var(--gl-radius-md)', overflow:'hidden', minWidth:220 }}>
      <div style={{ padding:'8px 12px', borderBottom:'1px solid var(--gl-border)', fontSize:10, fontWeight:700, letterSpacing:'.08em', textTransform:'uppercase', color:'var(--gl-fg-3)', display:'flex', alignItems:'center', gap:7 }}>
        <GLIcon name="keyboard" size={14} color="var(--gl-blue-500)" />Key log
      </div>
      <div style={{ padding:log.length?'4px 0':'12px', minHeight:40 }}>
        {!log.length ? <span style={{ fontSize:12, color:'var(--gl-fg-4)' }}>{hint || 'Press a key…'}</span>
          : log.map((e,i) => <div key={e.id} style={{ display:'flex', alignItems:'center', gap:8, padding:'3px 12px', opacity:1-i*0.12 }}>
              <Kbd>{e.key}</Kbd><span style={{ fontSize:11, color:'var(--gl-fg-4)' }}>→</span>
              <span style={{ fontSize:12, fontFamily:'var(--gl-font-mono)', color:e.ok?'var(--gl-success-500)':'var(--gl-danger-500)' }}>{e.action}</span>
            </div>)}
      </div>
    </div>
  );
}

/* ── Phase 06 base data (column types) ─────────────────────────── */
const RT_COLS = [

  { k:'util',  label:'Utilisation', w:158, sortKey:r=>r.util, typeTag:'progress',

  { k:'ref',   label:'Reference',   w:104, sortKey:r=>r.ref, typeTag:'link',
    render:r=><span className="lnk">{r.ref}</span> },
];
const BASE_ROWS = [
  { code:'1010', en:'Petty Cash',       ar:'النقدية',            type:'Asset',    bal:4200,    util:.12, color:'#4A7CFF', date:'2024-12-01', time:'09:14', st:'Reconciled', ref:'GL-1010' },
  { code:'1020', en:'Bank · SNB',       ar:'بنك الأهلي',        type:'Asset',    bal:182540,  util:.68, color:'#1DB88A', date:'2024-12-02', time:'11:02', st:'Reconciled', ref:'GL-1020' },
  { code:'2010', en:'Accounts Payable', ar:'الذمم الدائنة',     type:'Liability',bal:-74100,  util:.41, color:'#E0A23B', date:'2024-12-03', time:'15:47', st:'Pending',    ref:'GL-2010' },
  { code:'3010', en:'Share Capital',    ar:'رأس المال',         type:'Equity',   bal:-500000, util:.90, color:'#8B5CF6', date:'2024-11-30', time:'08:00', st:'Reconciled', ref:'GL-3010' },
  { code:'4010', en:'Sales Revenue',    ar:'إيرادات المبيعات', type:'Revenue',  bal:-640200, util:.77, color:'#1DB88A', date:'2024-12-04', time:'17:30', st:'Pending',    ref:'GL-4010' },
  { code:'5210', en:'Salaries Expense', ar:'مصروف الرواتب',    type:'Expense',  bal:156000,  util:.55, color:'#EF4444', date:'2024-12-04', time:'12:20', st:'Flagged',    ref:'GL-5210' },
];
function SortableGrid({ rtl }) {
  const [sort, setSort] = useState({ col: null, asc: true });
  const rows = useMemo(() => {
    if (sort.col == null) return BASE_ROWS;
    const k = RT_COLS[sort.col].sortKey;
    return [...BASE_ROWS].sort((a, b) => { const x=k(a), y=k(b); return (x<y?-1:x>y?1:0)*(sort.asc?1:-1); });
  }, [sort]);
  const onSort = ci => setSort(s => s.col===ci ? { col:ci, asc:!s.asc } : { col:ci, asc:true });
  const GT = RT_COLS.map(c=>c.w+'px').join(' ');
  const totalW = RT_COLS.reduce((a,c)=>a+c.w,0);
  return (
    <div className="vp" dir={rtl?'rtl':'ltr'} style={{ overflowX:'auto', border:'1px solid var(--gl-border-strong)', borderRadius:'var(--gl-radius-md)', background:'var(--gl-surface)' }}>
      <div style={{ minWidth:totalW }}>
        <div style={{ display:'grid', gridTemplateColumns:GT, background:'var(--gl-bg)' }}>
          {RT_COLS.map((c,ci) => (
            <div key={c.k} onClick={()=>onSort(ci)} title="Sort"
              style={{ padding:'8px 12px 9px', borderBottom:'1px solid var(--gl-border-strong)', cursor:'pointer', display:'flex', flexDirection:'column', gap:3, alignItems:c.align==='end'?'flex-end':'flex-start' }}>
              <span style={{ fontSize:9, fontWeight:700, letterSpacing:'.06em', textTransform:'uppercase', color:'var(--gl-blue-500)', fontFamily:'var(--gl-font-mono)', opacity:.8 }}>{c.typeTag}</span>
              <span style={{ display:'flex', alignItems:'center', gap:5, fontSize:10, fontWeight:700, letterSpacing:'.05em', textTransform:'uppercase', color:sort.col===ci?'var(--gl-fg-1)':'var(--gl-fg-3)' }}>
                {c.label}{sort.col===ci&&<span style={{display:'flex',transform:sort.asc?'none':'rotate(180deg)'}}><GLIcon name="chevD" size={11}/></span>}
              </span>
            </div>
          ))}
        </div>
        {rows.map((r, ri) => (
          <div key={r.code} style={{ display:'grid', gridTemplateColumns:GT, background:ri%2?'color-mix(in srgb,var(--gl-fg-1) 2%,transparent)':'transparent' }}>
            {RT_COLS.map((c,ci) => (
              <div key={c.k} style={{ minHeight:44, padding:'0 12px', display:'flex', alignItems:'center', justifyContent:c.align==='end'?'flex-end':'flex-start', borderInlineEnd:'1px solid var(--gl-border)', borderBottom:'1px solid var(--gl-border)', fontSize:12.5, color:'var(--gl-fg-1)', overflow:'hidden' }}>
                {c.render(r)}
              </div>
            ))}
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── Phase 01 — LTR / RTL keyboard directions ──────────────────── */
const P01_COLS = ['Code','Account','Type','Balance','Status'];
const P01_ROWS = [
  ['1010','Petty Cash','Asset','4,200.00','Active'],
  ['1020','Bank · SNB','Asset','182,540.00','Active'],
  ['2010','Payables','Liability','−74,100.00','Open'],
  ['3010','Share Capital','Equity','−500,000.00','Active'],
];
function KbdNavDemo() {
  const [dir, setDir] = useState('ltr');
  const [sel, setSel] = useState({ r:1, c:1 });
  const [focused, setFocused] = useState(false);
  const [log, push] = useKeyLog();
  const rtl = dir === 'rtl';
  const nR = P01_ROWS.length, nC = P01_COLS.length;
  const onKey = (e) => {
    const k = e.key;
    if (k==='ArrowRight'||k==='ArrowLeft') { e.preventDefault(); const isRight=k==='ArrowRight',d=hStep(isRight,rtl); setSel(s=>({...s,c:clamp(s.c+d,0,nC-1)})); push(k,'cell '+(isRight?'right →':'← left')); }
    else if (k==='ArrowDown') { e.preventDefault(); setSel(s=>({...s,r:clamp(s.r+1,0,nR-1)})); push('↓','cell down'); }
    else if (k==='ArrowUp') { e.preventDefault(); setSel(s=>({...s,r:clamp(s.r-1,0,nR-1)})); push('↑','cell up'); }
    else if (k==='Home') { e.preventDefault(); setSel(s=>({...s,c:0})); push('Home','first column'); }
    else if (k==='End') { e.preventDefault(); setSel(s=>({...s,c:nC-1})); push('End','last column'); }
  };
  const GT = '64px minmax(120px,1.4fr) 96px 130px 92px';
  return (
    <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', flexWrap:'wrap', gap:10 }}>
        <span style={{ fontSize:12.5, color:'var(--gl-fg-3)' }}>Click the grid, then press <Kbd>←</Kbd><Kbd>→</Kbd><Kbd>↑</Kbd><Kbd>↓</Kbd><Kbd>Home</Kbd><Kbd>End</Kbd></span>
        <Seg value={dir} onChange={setDir} options={[{value:'ltr',label:'LTR'},{value:'rtl',label:'RTL · عربي'}]} />
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'minmax(0,1fr) 230px', gap:16, alignItems:'start' }}>
        <div tabIndex={0} onFocus={()=>setFocused(true)} onBlur={()=>setFocused(false)} onKeyDown={onKey}
          style={{ outline:focused?'2px solid var(--gl-blue-500)':'none', outlineOffset:2, border:'1px solid var(--gl-border-strong)', borderRadius:8, overflow:'hidden' }}>
          <div dir={rtl?'rtl':'ltr'}>
            <div style={{ display:'grid', gridTemplateColumns:GT, background:'var(--gl-bg)' }}>
              {P01_COLS.map((c,ci) => <div key={c} style={{ padding:'9px 11px', fontSize:10, fontWeight:700, letterSpacing:'.05em', textTransform:'uppercase', color:ci===sel.c?'var(--gl-blue-500)':'var(--gl-fg-3)', borderBottom:'1px solid var(--gl-border-strong)', textAlign:ci>=3?(ci===3?'end':'center'):'start', whiteSpace:'nowrap' }}>{c}</div>)}
            </div>
            {P01_ROWS.map((row,r) => (
              <div key={r} style={{ display:'grid', gridTemplateColumns:GT }}>
                {row.map((v,c) => {
                  const on=sel.r===r&&sel.c===c;
                  return <div key={c} onClick={()=>setSel({r,c})}
                    style={{ height:38, padding:'0 11px', display:'flex', alignItems:'center', justifyContent:c>=3?(c===3?'flex-end':'center'):'flex-start',
                      borderInlineEnd:'1px solid var(--gl-border)', borderBottom:'1px solid var(--gl-border)',
                      background:on?'color-mix(in srgb,var(--gl-blue-500) 11%,var(--gl-surface))':'var(--gl-surface)',
                      boxShadow:on?'inset 0 0 0 2px var(--gl-blue-500)':'none', position:on?'relative':'static', zIndex:on?2:1,
                      fontFamily:(c===0||c===3)?'var(--gl-font-mono)':'var(--gl-font-body)', fontSize:12.5,
                      color:c===3&&v.startsWith('−')?'var(--gl-danger-500)':'var(--gl-fg-1)', cursor:'pointer' }}>
                    {c===4?<span style={{fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:999,color:v==='Active'?'var(--gl-success-500)':'var(--gl-warning-500)',background:'color-mix(in srgb,'+(v==='Active'?'var(--gl-success-500)':'var(--gl-warning-500)')+' 16%,transparent)'}}>{v}</span>:v}
                  </div>;
                })}
              </div>
            ))}
          </div>
        </div>
        <KeyLog log={log} hint="Click the grid, press arrows" />
      </div>
      <div style={{ fontSize:12.5, color:'var(--gl-fg-3)', lineHeight:1.5 }}>
        Selected <strong style={{color:'var(--gl-fg-1)'}}>{P01_COLS[sel.c]}</strong> · row {sel.r+1}. Columns reverse on screen under RTL, but <Kbd>→</Kbd> still selects the cell to the visual right.
        </div>
    </div>
  );
}

/* ── Phase 02 — Scroll on focus ─────────────────────────────────── */
const P02_COLS = [
  { k:'code',label:'Code',w:78,mono:true},{k:'en',label:'Account (EN)',w:180},
  { k:'ar',label:'الحساب',w:160,ar:true},{k:'type',label:'Type',w:116},
  { k:'bal',label:'Balance',w:138,mono:true,e:true},{k:'cur',label:'Ccy',w:68,mono:true,c:true},
  { k:'date',label:'Updated',w:110,mono:true},{k:'st',label:'Status',w:110},
];
const P02_ROWS = [
  {code:'1010',en:'Petty Cash',ar:'النقدية',type:'Asset',bal:'4,200.00',cur:'SAR',date:'2024-12-01',st:'Active'},
  {code:'1020',en:'Bank · SNB',ar:'بنك الأهلي',type:'Asset',bal:'182,540.00',cur:'SAR',date:'2024-12-02',st:'Active'},
  {code:'1030',en:'Bank · Al Rajhi',ar:'بنك الراجحي',type:'Asset',bal:'96,120.00',cur:'SAR',date:'2024-12-03',st:'Open'},
  {code:'1110',en:'Receivables',ar:'الذمم المدينة',type:'Asset',bal:'54,800.00',cur:'SAR',date:'2024-12-01',st:'Active'},
  {code:'1210',en:'Inventory · Riyadh',ar:'المخزون · الرياض',type:'Asset',bal:'231,450.00',cur:'SAR',date:'2024-12-02',st:'Active'},
  {code:'2010',en:'Accounts Payable',ar:'الذمم الدائنة',type:'Liability',bal:'−74,100.00',cur:'SAR',date:'2024-12-03',st:'Open'},
  {code:'2110',en:'VAT Payable',ar:'ضريبة القيمة المضافة',type:'Liability',bal:'−18,940.00',cur:'SAR',date:'2024-12-04',st:'Active'},
  {code:'2210',en:'Accrued Salaries',ar:'رواتب مستحقة',type:'Liability',bal:'−42,500.00',cur:'SAR',date:'2024-12-04',st:'Active'},
  {code:'3010',en:'Share Capital',ar:'رأس المال',type:'Equity',bal:'−500,000.00',cur:'SAR',date:'2024-11-30',st:'Active'},
  {code:'4010',en:'Sales Revenue',ar:'إيرادات المبيعات',type:'Revenue',bal:'−640,200.00',cur:'SAR',date:'2024-12-04',st:'Active'},
  {code:'5010',en:'COGS',ar:'تكلفة المبيعات',type:'Expense',bal:'388,900.00',cur:'SAR',date:'2024-12-04',st:'Active'},
  {code:'5210',en:'Salaries Expense',ar:'مصروف الرواتب',type:'Expense',bal:'156,000.00',cur:'SAR',date:'2024-12-04',st:'Active'},
];
function ScrollFocusDemo() {
  const [sel, setSel] = useState({ r:0, c:0 });
  const [rtl, setRtl] = useState(false);
  const vpRef = useRef(null), cellRef = useRef(null);
  const nR = P02_ROWS.length, nC = P02_COLS.length;
  const [scroll, setScroll] = useState({ x:0, y:0 });
  useLayoutEffect(() => {
    const vp=vpRef.current, cell=cellRef.current; if(!vp||!cell) return;
    const sv=vp.getBoundingClientRect(), cr=cell.getBoundingClientRect();
    const headH=(vp.querySelector('[data-sticky]')||{getBoundingClientRect:()=>({height:0})}).getBoundingClientRect().height;
    let dy=0,dx=0;
    if(cr.top<sv.top+headH+4) dy=cr.top-sv.top-headH-4;
    else if(cr.bottom>sv.bottom-4) dy=cr.bottom-sv.bottom+4;
    if(cr.left<sv.left+4) dx=cr.left-sv.left-4;
    else if(cr.right>sv.right-4) dx=cr.right-sv.right+4;
    if(dy) vp.scrollTop+=dy; if(dx) vp.scrollLeft+=dx;
  }, [sel, rtl]);
  useEffect(() => {
    const vp=vpRef.current; if(!vp) return;
    const f=()=>setScroll({x:Math.round(vp.scrollLeft),y:Math.round(vp.scrollTop)});
    f(); vp.addEventListener('scroll',f,{passive:true}); return()=>vp.removeEventListener('scroll',f);
  }, []);
  const onKey = (e) => {
    let handled=true;

/* ── Phase 08 — Advanced filtering ──────────────────────────────── */
const F_COLS = [
  { key:'code', label:'Code',    w:80,  type:'text',   mono:true },
  { key:'en',   label:'Account', w:200, type:'text' },
  { key:'type', label:'Type',    w:120, type:'enum' },

  { key:'date', label:'Posted',  w:120, type:'date',   mono:true },
  { key:'st',   label:'Status',  w:120, type:'enum' },
];
const F_ROWS = [
  { code:'1010', en:'Petty Cash',        type:'Asset',     bal:4200,    date:'2024-12-01', st:'Reconciled' },
  { code:'1020', en:'Bank · SNB',        type:'Asset',     bal:182540,  date:'2024-12-02', st:'Reconciled' },
  { code:'1110', en:'Receivables',       type:'Asset',     bal:54800,   date:'2024-11-28', st:'Pending' },
  { code:'2010', en:'Accounts Payable',  type:'Liability', bal:-74100,  date:'2024-12-03', st:'Pending' },
  { code:'2110', en:'VAT Payable',       type:'Liability', bal:-18940,  date:'2024-12-04', st:'Flagged' },
  { code:'3010', en:'Share Capital',     type:'Equity',    bal:-500000, date:'2024-11-30', st:'Reconciled' },
  { code:'4010', en:'Sales Revenue',     type:'Revenue',   bal:-640200, date:'2024-12-04', st:'Pending' },
  { code:'5210', en:'Salaries Expense',  type:'Expense',   bal:156000,  date:'2024-12-04', st:'Flagged' },
  { code:'5410', en:'Utilities',         type:'Expense',   bal:19600,   date:'2024-12-02', st:'Reconciled' },
];
// operator catalog — mirrors ReadableFilterCatalog (ops per type · arity · label)
const F_OPS = {
  text:   ['contains','notContains','equals','startsWith','endsWith','isEmpty','isNotEmpty'],
  number: ['equals','notEquals','greater','greaterOrEqual','less','lessOrEqual','between'],
  enum:   ['isAnyOf','isNoneOf','equals','notEquals'],
  date:   ['equals','less','greater','between'],
};
const F_ARITY = op => ['isEmpty','isNotEmpty'].includes(op) ? 'none' : op==='between' ? 'two' : ['isAnyOf','isNoneOf'].includes(op) ? 'set' : 'one';
const F_LABEL = (op, type) => {
  const temporal = type==='date';
  return ({
    contains:'contains', notContains:'does not contain', startsWith:'starts with', endsWith:'ends with',
    equals: temporal?'is on':'is', notEquals: temporal?'is not on':'is not',
    greater: temporal?'is after':'is greater than', greaterOrEqual: temporal?'is on or after':'is ≥',
    less: temporal?'is before':'is less than', lessOrEqual: temporal?'is on or before':'is ≤',
    between:'is between', isAnyOf:'is any of', isNoneOf:'is none of', isEmpty:'is empty', isNotEmpty:'is not empty',
  })[op];
};
const F_FMT = (v, type) => v==null||v===''?'—':type==='number'?Number(v).toLocaleString('en-US'):String(v);
const F_SUMMARY = (f) => {
  const col = F_COLS[f.col], op = F_LABEL(f.op, col.type), a = F_ARITY(f.op);
  if(a==='none') return col.label+' '+op;
  if(a==='one')  return col.label+' '+op+' '+F_FMT(f.v1, col.type);
  if(a==='two')  return col.label+' '+op+' '+F_FMT(f.v1,col.type)+' and '+F_FMT(f.v2,col.type);
  const list=[...f.opts]; return col.label+' '+op+' '+list.slice(0,3).join(', ')+(list.length>3?' +'+(list.length-3):'');
};
const F_COMPLETE = (f) => {
  const a = F_ARITY(f.op);
  if(a==='none') return true; if(a==='set') return f.opts.size>0;
  if(a==='two') return f.v1!==''&&f.v1!=null&&f.v2!==''&&f.v2!=null;
  return f.v1!==''&&f.v1!=null;
};
function fText(f, row){
  const col=F_COLS[f.col], raw=row[col.key], s=String(raw??'').toLowerCase();
  const num=v=>Number(v), eq=(a,b)=>col.type==='number'?num(a)===num(b):String(a).toLowerCase()===String(b).toLowerCase();
  const cmp=(a,b)=>col.type==='number'?num(a)-num(b):String(a)<String(b)?-1:String(a)>String(b)?1:0;
  switch(f.op){
    case 'contains': return s.includes(String(f.v1).toLowerCase());
    case 'notContains': return !s.includes(String(f.v1).toLowerCase());
    case 'startsWith': return s.startsWith(String(f.v1).toLowerCase());
    case 'endsWith': return s.endsWith(String(f.v1).toLowerCase());
    case 'equals': return eq(raw, f.v1);
    case 'notEquals': return !eq(raw, f.v1);
    case 'greater': return cmp(raw, f.v1)>0;
    case 'greaterOrEqual': return cmp(raw, f.v1)>=0;
    case 'less': return cmp(raw, f.v1)<0;
    case 'lessOrEqual': return cmp(raw, f.v1)<=0;
    case 'between': return cmp(raw,f.v1)>=0 && cmp(raw,f.v2)<=0;
    case 'isAnyOf': return f.opts.has(String(raw));
    case 'isNoneOf': return !f.opts.has(String(raw));
    case 'isEmpty': return s.trim()==='';
    case 'isNotEmpty': return s.trim()!=='';
    default: return true;
  }
}

                background:sel?'color-mix(in srgb,var(--gl-blue-500) 14%,var(--gl-surface))':'var(--gl-input-bg)',

      <Section title="Sortable grid — typed column kinds" desc="Click any header to sort by its typed key. The small monospace tag above the label names the column kind: text · number · enum · progress · color · date · time · link. Every renderer is theme-aware; flip to RTL to mirror the whole grid." cols="1fr">
        <div style={{ gridColumn:'1 / -1', display:'flex', flexDirection:'column', gap:12 }}>
          <div style={{ display:'flex', justifyContent:'flex-end' }}>
            <Seg value={rtl?'rtl':'ltr'} onChange={v=>setRtl(v==='rtl')} options={[{value:'ltr',label:'LTR'},{value:'rtl',label:'RTL · عربي'}]}/>
          </div>
          <SortableGrid rtl={rtl}/>
          <div style={{fontSize:12,color:'var(--gl-fg-3)'}}>
            Types (left → right): <code style={{fontFamily:'var(--gl-font-mono)',fontSize:11}}>text · text (bilingual) · enum badge · number · progress · color · date · time · status · link</code>.
            </div>
        </div>
      </Section>
      <Section title="Phase 01 — LTR / RTL arrow-key directions" desc="Horizontal arrow keys must map to the correct visual direction in both LTR and RTL. Fix: resolve any horizontal key through horizontalStep(key, dir) — in RTL the index axis mirrors on screen, so the step flips. Home / End are direction-agnostic (first / last column)." cols="1fr">
        <div style={{ gridColumn:'1 / -1' }}><KbdNavDemo /></div>
      </Section>
      <Section title="Phase 02 — Scroll on focus" desc="When a cell is focused via the keyboard in a bounded viewport, ReadableTable scrolls it into view on both axes. Covers more rows or columns than fit on screen; RTL-correct. A key parked on the active cell drives Scrollable.ensureVisible — no hand-rolled offset math." cols="1fr">
        <div style={{ gridColumn:'1 / -1' }}><ScrollFocusDemo /></div>
      </Section>
      <Section title="Phase 04 — Column resizing" desc="Drag handles live on each header's inline-end edge. Dragging updates that column's width live; double-click resets to default. Width state lives in the controller — header and every row read widthOf(i), so the whole grid reflows in one frame. RTL-correct: the handle mirrors and the delta flips." cols="1fr">
        <div style={{ gridColumn:'1 / -1' }}><ColResizeDemo /></div>
      </Section>
      <Section title="Phase 05 — Column reordering" desc="Grab a header by its grip and drop it before or after another. A blue insertion line previews the drop position. Column order is an index list in the controller — moveColumn(from, to) reorders it; header and rows both read columnAt(visualIndex)." cols="1fr">
        <div style={{ gridColumn:'1 / -1' }}><ColReorderDemo /></div>
      </Section>
      <Section title="Phase 07 — Copy rows &amp; cells" desc="Select rows (click / Shift / Ctrl) or cells (click / Shift-rectangle / Ctrl-toggle), then ⌘C. Selection serializes to tab-separated values and goes to the real OS clipboard. Cell mode copies the bounding rectangle (gaps blank so the shape is preserved in Sheets/Excel)." cols="1fr">
        <div style={{ gridColumn:'1 / -1' }}><CopyTableDemo /></div>
      </Section>
      <Section title="Phase 08 — Advanced filtering" desc="A typed, per-column filter layer. The controller derives the visible rows from an immutable master set as sort(filter(master)); selection is pruned to what's visible. Add filters from the editor (column → condition → operand), combine them with AND/OR, toggle a chip without removing it, and narrow further with a cross-column search." cols="1fr">
        <div style={{ gridColumn:'1 / -1' }}><FilterDemo /></div>
      </Section>
      <Section title="Column types" desc="Typed factory methods — mirror of EditableTable. The renderer lives in readable_table_cells.dart; the legacy unnamed constructor with a custom cell builder still works unchanged." cols="1fr">
        <div style={{ gridColumn:'1 / -1' }}><TypeRef /></div>
      </Section>
      <Section title="States" cols="repeat(auto-fill, minmax(280px, 1fr))">
        <Spec label="Loading"><ReadableStateBox kind="loading" /></Spec>
        <Spec label="Empty"><ReadableStateBox kind="empty" /></Spec>
        <Spec label="Error"><ReadableStateBox kind="error" /></Spec>
      </Section>
    </Shell>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
