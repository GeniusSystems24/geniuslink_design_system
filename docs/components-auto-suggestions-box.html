<!-- @dsCard group="Components" name="AutoSuggestionsBox" subtitle="Typed auto-suggest field · static / async / hybrid" viewport="1180x880" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>GeniusLink — AutoSuggestionsBox</title>
<meta name="viewport" content="width=1180" />
<link rel="stylesheet" href="tokens.css" />
<style>
  html,body{margin:0;padding:0}
  body{font-family:var(--gl-font-body);background:var(--gl-bg);color:var(--gl-fg-1)}
  *{box-sizing:border-box}
  ::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:var(--gl-border-strong);border-radius:5px}
  button{font-family:inherit}
  .wrap{max-width:1100px;margin:0 auto;padding:46px 32px 120px}
  .eyebrow{font-size:11px;font-weight:700;letter-spacing:1.6px;color:var(--gl-blue-500);text-transform:uppercase}
  h1{font-family:var(--gl-font-display);font-size:32px;font-weight:800;letter-spacing:-.5px;margin:10px 0 8px}
  .lede{font-size:15px;line-height:1.55;color:var(--gl-fg-3);max-width:680px;margin:0}
  .feats{display:flex;flex-wrap:wrap;gap:8px;margin-top:18px}
  .feats span{font-size:11.5px;font-weight:600;color:var(--gl-fg-2);background:var(--gl-surface);
              border:1px solid var(--gl-border);border-radius:999px;padding:5px 11px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:26px;margin-top:38px}
  @media (max-width:860px){.grid{grid-template-columns:1fr}}
  .card{background:var(--gl-surface);border:1px solid var(--gl-border);border-radius:var(--gl-radius-lg);padding:20px 20px 24px}
  .card h3{font-family:var(--gl-font-display);font-size:15px;font-weight:700;margin:0 0 3px;display:flex;align-items:center;gap:8px}
  .card .idx{color:var(--gl-blue-500);font-weight:800;font-size:12px}
  .card p{font-size:12.5px;line-height:1.5;color:var(--gl-fg-3);margin:0 0 16px}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
  .chip{padding:6px 12px;border-radius:999px;border:1px solid var(--gl-border);background:var(--gl-bg);
        font-size:12.5px;font-weight:600;color:var(--gl-fg-3);cursor:pointer;transition:var(--gl-transition-color)}
  .chip.on{background:var(--gl-blue-500);border-color:var(--gl-blue-500);color:#fff}

  /* field */
  .asb{position:relative}
  .field{display:flex;align-items:center;gap:8px;height:42px;padding:0 8px 0 12px;background:var(--gl-bg);
         border:1.4px solid var(--gl-border);border-radius:var(--gl-radius-md);transition:border-color var(--gl-dur-fast)}
  .field.focus{border-color:var(--gl-blue-500);background:var(--gl-surface)}
  .field svg{flex:0 0 auto;color:var(--gl-fg-4)}
  .field.focus svg.lead{color:var(--gl-blue-500)}
  .field input{flex:1;border:none;outline:none;background:transparent;font-family:var(--gl-font-body);
               font-size:14px;color:var(--gl-fg-1);min-width:0}
  .field input::placeholder{color:var(--gl-fg-4)}
  .iconbtn{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border:none;
           background:none;cursor:pointer;border-radius:6px;color:var(--gl-fg-4);transition:var(--gl-transition-color)}
  .iconbtn:hover{background:var(--gl-hover);color:var(--gl-fg-1)}
  .spin{width:15px;height:15px;border:2px solid color-mix(in srgb,var(--gl-blue-500) 30%,transparent);
        border-top-color:var(--gl-blue-500);border-radius:50%;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}

  /* overlay */
  .ov{position:absolute;left:0;right:0;top:calc(100% + 4px);z-index:var(--gl-z-dropdown);
      background:var(--gl-surface);border:1px solid var(--gl-border);border-radius:var(--gl-radius-lg);
      box-shadow:var(--gl-shadow);overflow:hidden;max-height:296px;overflow-y:auto}
  .ghead{padding:9px 14px 5px;font-size:10.5px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--gl-fg-4)}
  .row{display:flex;align-items:center;gap:10px;height:38px;padding:0 12px;cursor:pointer;
       border-left:2.5px solid transparent}
  .row.hl{background:var(--gl-hover);border-left-color:var(--gl-blue-500)}
  .row .ic{color:var(--gl-fg-4)}
  .row.hl .ic{color:var(--gl-blue-500)}
  .row .lab{font-size:13.5px;font-weight:500;color:var(--gl-fg-1);line-height:1.15}
  .row .desc{font-size:11.5px;color:var(--gl-fg-3);line-height:1.15}
  .row b{color:var(--gl-blue-500);font-weight:700}
  .row .ret{margin-left:auto;color:var(--gl-fg-4)}
  .empty{display:flex;align-items:center;gap:8px;padding:14px;font-size:13px;color:var(--gl-fg-3)}
  .pick{margin-top:14px;display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--gl-fg-3)}
  .pick b{color:var(--gl-fg-1)}
  .hintbar{margin-top:12px;font-size:11.5px;color:var(--gl-fg-4)}
  kbd{font-family:var(--gl-font-mono,monospace);font-size:11px;background:var(--gl-bg);border:1px solid var(--gl-border);
      border-bottom-width:2px;border-radius:4px;padding:1px 5px;color:var(--gl-fg-2)}
</style>
<template id="__bundler_thumbnail"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#F7F8FA"/><rect x="16" y="20" width="68" height="15" rx="4" fill="#fff" stroke="#4A7CFF" stroke-width="1.6"/><circle cx="24" cy="27.5" r="3.4" fill="none" stroke="#4A7CFF" stroke-width="1.6"/><rect x="18" y="40" width="64" height="44" rx="5" fill="#fff" stroke="#E2E8F0"/><rect x="18" y="44" width="64" height="13" rx="0" fill="#EEF3FF"/><rect x="18" y="44" width="2.6" height="13" fill="#4A7CFF"/><rect x="26" y="48" width="20" height="5" rx="2.5" fill="#C7D2FE"/><rect x="48" y="48" width="12" height="5" rx="2.5" fill="#4A7CFF"/><rect x="26" y="63" width="40" height="5" rx="2.5" fill="#E2E8F0"/><rect x="26" y="73" width="34" height="5" rx="2.5" fill="#E2E8F0"/></svg></template>
</head>
<body data-theme="light">
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const { useState, useRef, useMemo, useEffect, useCallback } = React;

function Search({s=16}){return <svg className="lead" width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>;}
function Chevron({up}){return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d={up?"M6 15l6-6 6 6":"M6 9l6 6 6-6"}/></svg>;}
function Ret(){return <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M9 10l-4 4 4 4"/><path d="M20 4v7a3 3 0 0 1-3 3H5"/></svg>;}
function NoMatch(){return <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3M8.5 8.5l5 5M13.5 8.5l-5 5"/></svg>;}

/* ── match + highlight (mirrors AutoSuggestionMatching) ── */
function test(hay, q, mode){
  hay=hay.toLowerCase(); q=q.toLowerCase();
  if(!q) return true;
  if(mode==='prefix') return hay.startsWith(q);
  if(mode==='words') return q.split(/\s+/).filter(Boolean).every(t=>hay.includes(t));
  if(mode==='fuzzy'){let i=0;for(let j=0;j<hay.length&&i<q.length;j++)if(hay[j]===q[i])i++;return i===q.length;}
  return hay.includes(q);
}
function spans(label,q,mode){
  if(!q.trim())return[];
  const lower=label.toLowerCase(); q=q.trim().toLowerCase();
  const out=[];
  const contig=(tok)=>{let from=0;while(true){const i=lower.indexOf(tok,from);if(i<0)break;out.push([i,i+tok.length]);from=i+tok.length;}};
  if(mode==='fuzzy'){let i=0;for(let j=0;j<lower.length&&i<q.length;j++)if(lower[j]===q[i]){out.push([j,j+1]);i++;}if(i<q.length)return[];}
  else if(mode==='words'){q.split(/\s+/).filter(Boolean).forEach(contig);}
  else contig(q);
  out.sort((a,b)=>a[0]-b[0]);
  // merge
  const m=[];for(const s of out){const l=m[m.length-1];if(l&&s[0]<=l[1])l[1]=Math.max(l[1],s[1]);else m.push(s.slice());}
  return m;
}
function Highlight({text,q,mode}){
  const sp=spans(text,q,mode);
  if(!sp.length)return <span>{text}</span>;
  const out=[];let cur=0;
  sp.forEach((s,k)=>{if(s[0]>cur)out.push(<span key={'p'+k}>{text.slice(cur,s[0])}</span>);out.push(<b key={'b'+k}>{text.slice(s[0],s[1])}</b>);cur=s[1];});
  if(cur<text.length)out.push(<span key="t">{text.slice(cur)}</span>);
  return <span>{out}</span>;
}

/* ── the box ── */
function AutoSuggestionsBox({source, placeholder, mode='contains', grouped=false, onPick}){
  const [text,setText]=useState('');
  const [open,setOpen]=useState(false);
  const [focus,setFocus]=useState(false);
  const [hl,setHl]=useState(0);
  const [results,setResults]=useState(()=>source.run('',mode));
  const [loading,setLoading]=useState(false);
  const seq=useRef(0);
  const inputRef=useRef(null);
  const blurT=useRef(null);

  const run=useCallback((q)=>{
    const my=++seq.current;
    const r=source.run(q,mode);
    if(r&&typeof r.then==='function'){
      setLoading(true);
      r.then(list=>{if(my!==seq.current)return;setResults(list);setHl(list.length?0:-1);setLoading(false);});
    }else{setResults(r);setHl(r.length?0:-1);setLoading(false);}
  },[source,mode]);

  useEffect(()=>{run(text);},[mode]);   // re-run when strategy changes

  const onInput=e=>{const v=e.target.value;setText(v);setOpen(true);run(v);};
  const move=d=>{if(!results.length)return;setHl(h=>{let n=(h+d)%results.length;if(n<0)n+=results.length;return n;});setOpen(true);};
  const pick=item=>{setText(item.label);setOpen(false);onPick&&onPick(item.label);inputRef.current&&inputRef.current.blur();};
  const onKey=e=>{
    if(e.key==='ArrowDown'){e.preventDefault();move(1);}
    else if(e.key==='ArrowUp'){e.preventDefault();move(-1);}
    else if(e.key==='Enter'){e.preventDefault();if(hl>=0&&results[hl])pick(results[hl]);else{onPick&&onPick('“'+text+'” (free text)');setOpen(false);}}
    else if(e.key==='Escape'){setOpen(false);}
  };

  let lastGroup=null;
  const wrapRef=useRef(null);
  const ovRef=useRef(null);
  // Keep the highlighted row visible inside the overlay as you arrow through it
  // (adjusts the overlay's scrollTop directly — mirrors Dart _ensureHighlightVisible).
  useEffect(()=>{
    const ov=ovRef.current; if(!ov||hl<0)return;
    const row=ov.querySelector('.row.hl'); if(!row)return;
    const rTop=row.offsetTop, rBot=rTop+row.offsetHeight;
    if(rTop<ov.scrollTop) ov.scrollTop=rTop;
    else if(rBot>ov.scrollTop+ov.clientHeight) ov.scrollTop=rBot-ov.clientHeight;
  },[hl,open,results]);
  // Scroll-on-focus: bring the field into view (with room below for the overlay)
  // using window.scrollTo — mirrors the Dart Scrollable.ensureVisible behaviour.
  const scrollOnFocus=()=>{
    requestAnimationFrame(()=>{
      const el=wrapRef.current; if(!el)return;
      const r=el.getBoundingClientRect();
      const topMargin=130, overlayRoom=300;
      const above=r.top<topMargin;
      const belowFold=(r.bottom+overlayRoom)>window.innerHeight;
      if(above||belowFold){
        window.scrollTo({top:Math.max(0,window.scrollY+r.top-topMargin),behavior:'smooth'});
      }
    });
  };
  return (
    <div className="asb" ref={wrapRef}>
      <div className={'field'+(focus?' focus':'')}>
        <Search/>
        <input ref={inputRef} value={text} placeholder={placeholder} onChange={onInput} onKeyDown={onKey}
          onFocus={()=>{clearTimeout(blurT.current);setFocus(true);setOpen(true);run(text);scrollOnFocus();}}
          onBlur={()=>{setFocus(false);blurT.current=setTimeout(()=>setOpen(false),120);}}/>
        {loading&&<div className="spin"/>}
        {text?<button className="iconbtn" onMouseDown={e=>{e.preventDefault();setText('');run('');inputRef.current.focus();}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.9"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
          :<button className="iconbtn" onMouseDown={e=>{e.preventDefault();setOpen(o=>!o);}}><Chevron up={open}/></button>}
      </div>
      {open&&(
        <div className="ov" ref={ovRef}>
          {loading&&results.length===0
            ? <div className="empty"><div className="spin"/><span>{text.trim()?'Searching “'+text+'”…':'Loading…'}</span></div>
            : results.length===0
            ? <div className="empty"><NoMatch/><span>{text.trim()?'No matches for “'+text+'”':'Type to search'}</span></div>
            : results.map((item,i)=>{
                const head=grouped&&item.group&&item.group!==lastGroup; if(head)lastGroup=item.group;
                return (
                  <React.Fragment key={item.label+i}>
                    {head&&<div className="ghead">{item.group}</div>}
                    <div className={'row'+(i===hl?' hl':'')} onMouseEnter={()=>setHl(i)} onMouseDown={e=>{e.preventDefault();pick(item);}}>
                      {item.icon&&<span className="ic">{item.icon}</span>}
                      <div>
                        <div className="lab"><Highlight text={item.label} q={text} mode={mode}/></div>
                        {item.desc&&<div className="desc">{item.desc}</div>}
                      </div>
                      {i===hl&&<span className="ret"><Ret/></span>}
                    </div>
                  </React.Fragment>
                );
              })}
        </div>
      )}
    </div>
  );
}

/* ── sources ── */
const FRUITS=['Apple','Apricot','Avocado','Banana','Blackberry','Blueberry','Cherry','Clementine','Coconut','Cranberry','Date','Dragonfruit','Fig','Grape','Grapefruit','Guava','Kiwi','Lemon','Lime','Lychee','Mango','Melon','Nectarine','Orange','Papaya','Peach','Pear','Pineapple','Plum','Pomegranate','Raspberry','Strawberry','Tangerine','Watermelon'];
const dot=c=><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8"><circle cx="12" cy="12" r="8"/></svg>;
const ACCOUNTS=[
  {label:'Cash on hand',desc:'1000 · Current asset',group:'Assets',icon:dot('#1DB88A')},
  {label:'Accounts receivable',desc:'1100 · Current asset',group:'Assets',icon:dot('#1DB88A')},
  {label:'Inventory',desc:'1200 · Current asset',group:'Assets',icon:dot('#1DB88A')},
  {label:'Accounts payable',desc:'2000 · Current liability',group:'Liabilities',icon:dot('#F97316')},
  {label:'Accrued expenses',desc:'2100 · Current liability',group:'Liabilities',icon:dot('#F97316')},
  {label:'Share capital',desc:'3000 · Equity',group:'Equity',icon:dot('#A855F7')},
  {label:'Sales revenue',desc:'4000 · Income',group:'Income',icon:dot('#4A7CFF')},
  {label:'Payroll',desc:'5100 · Expense',group:'Expense',icon:dot('#EF4444')},
  {label:'Marketing',desc:'5200 · Expense',group:'Expense',icon:dot('#EF4444')},
];
const LOCAL_VENDORS=['Acme Corp','Globex','Initech'];
const REMOTE_VENDORS=['Soylent Industries','Umbrella Logistics','Stark Supplies','Wayne Enterprises','Wonka Foods','Cyberdyne Systems','Tyrell Corp','Hooli','Massive Dynamic','Oscorp'];

const listSource=(arr)=>({run:(q,mode)=>arr.filter(x=>test(typeof x==='string'?x:(x.label+' '+(x.desc||'')),q,mode)).map(x=>typeof x==='string'?{label:x}:x)});
const asyncSource=()=>({run:(q)=>new Promise(res=>setTimeout(()=>res(REMOTE_VENDORS.filter(v=>v.toLowerCase().includes(q.trim().toLowerCase())).map(v=>({label:v,icon:dot('#64748B')}))),460))});
const hybridSource=()=>({run:(q,mode)=>{
  const local=LOCAL_VENDORS.filter(v=>test(v,q,mode)).map(v=>({label:v,desc:'local',icon:dot('#1DB88A')}));
  if(local.length>=1||!q.trim())return local;
  return new Promise(res=>setTimeout(()=>{
    const remote=REMOTE_VENDORS.filter(v=>v.toLowerCase().includes(q.trim().toLowerCase())).map(v=>({label:v,desc:'loaded',icon:dot('#64748B')}));
    res([...local,...remote]);
  },460));
}});

function Demo(){
  const [mode,setMode]=useState('contains');
  const [pick,setPick]=useState('—');
  const fruitSrc=useMemo(()=>listSource(FRUITS),[]);
  const acctSrc=useMemo(()=>listSource(ACCOUNTS),[]);
  const asyncSrc=useMemo(()=>asyncSource(),[]);
  const hybridSrc=useMemo(()=>hybridSource(),[]);
  return (
    <div className="wrap">
      <div className="eyebrow">GeniusLink Design System</div>
      <h1>AutoSuggestionsBox</h1>
      <p className="lede">A typed, themeable auto-suggest field. Type to filter, <kbd>↑</kbd> <kbd>↓</kbd> to move,
      <kbd>↵</kbd> or click to pick. Static, grouped, async and <b>hybrid</b> (local-first, load-more) sources — with match highlighting.</p>

      <div className="feats">
        <span>4 source types</span><span>4 match strategies</span><span>itemBuilder</span>
        <span>emptyBuilder</span><span>loadingBuilder</span><span>keyboard nav</span>
        <span>scroll-on-focus</span><span>RTL + dark</span>
      </div>

      <div className="grid">
        <div className="card">
          <h3><span className="idx">01</span> Static list</h3>
          <p>A plain list filtered locally as you type. Try “<b>rry</b>” or “<b>an</b>”.</p>
          <AutoSuggestionsBox source={fruitSrc} mode={mode} placeholder="Search a fruit…" onPick={setPick}/>
          <div className="hintbar">Highlight + match strategy follow the toggle in card 04.</div>
        </div>

        <div className="card">
          <h3><span className="idx">02</span> Grouped · icon + description</h3>
          <p>Section headers, leading glyphs and a secondary line. Searches label + description.</p>
          <AutoSuggestionsBox source={acctSrc} grouped mode={mode} placeholder="Find an account…" onPick={setPick}/>
        </div>

        <div className="card">
          <h3><span className="idx">03</span> Async · custom builders</h3>
          <p>Debounced “network” search with a custom <b>loadingBuilder</b> (spinner row), <b>emptyBuilder</b> and <b>itemBuilder</b>. Type to load vendors.</p>
          <AutoSuggestionsBox source={asyncSrc} mode={mode} placeholder="Search a vendor…" onPick={setPick}/>
        </div>

        <div className="card">
          <h3><span className="idx">04</span> Hybrid · local + load-more</h3>
          <p>Three vendors are local (instant). Anything else loads on demand and merges in. Try “<b>acme</b>” vs “<b>stark</b>”.</p>
          <div className="chips">
            {['contains','prefix','words','fuzzy'].map(m=>
              <button key={m} className={'chip'+(mode===m?' on':'')} onClick={()=>setMode(m)}>{m}</button>)}
          </div>
          <AutoSuggestionsBox source={hybridSrc} mode={mode} placeholder="Type or pick a vendor…" onPick={setPick}/>
          <div className="pick"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--gl-blue-500)" strokeWidth="1.9"><path d="M20 6L9 17l-5-5"/></svg>Last picked: <b>{pick}</b></div>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
