name: geniuslink_design_system_example
description: Example app embedding the GeniusLink Design System widgets in realistic workspace shells.
publish_to: "none"
version: 2.0.0

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  smart_auto_suggest_box: ^0.15.3
  geniuslink_design_system:
    path: ../

dev_dependencies:
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo-mark.png
