name: geniuslink_design_system
description: A Flutter design-system package for GeniusLink foundations, core, domain, chart, skeleton, form, data, pattern, motion, and browser-tab components.
version: 1.2.1
repository: https://github.com/GeniusSystems24/geniuslink_design_system
issue_tracker: https://github.com/GeniusSystems24/geniuslink_design_system/issues

screenshots:
  - description: Browser-style workspace tabs with preview and tab-list dropdown.
    path: snapshots/2.png
  - description: Context menu actions for close, duplicate, and pin behavior.
    path: snapshots/3.png
  - description: RTL tab layout with mirrored controls.
    path: snapshots/1.png
  - description: Animated preview of tab interactions.
    path: snapshots/preview.gif

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.10.0"

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

topics:
  - design-system
  - flutter-widget
  - navigation
  - tabs

dependencies:
  flutter:
    sdk: flutter
  smart_auto_suggest_box: ^0.15.3

dev_dependencies:
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  # Drop the .ttf files under flutter/assets/fonts/ to match the design
  # system exactly. Until then the families fall back to the platform UI
  # font and the layout still holds. Families used:
  #   Manrope (display), Inter (body), JetBrainsMono (mono), NotoNaskhArabic.
  #
  # fonts:
  #   - family: Manrope
  #     fonts:
  #       - asset: assets/fonts/Manrope-Regular.ttf
  #       - asset: assets/fonts/Manrope-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Manrope-Bold.ttf
  #         weight: 700
  #       - asset: assets/fonts/Manrope-ExtraBold.ttf
  #         weight: 800
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Inter-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700
  #   - family: JetBrainsMono
  #     fonts:
  #       - asset: assets/fonts/JetBrainsMono-Regular.ttf
  #       - asset: assets/fonts/JetBrainsMono-Bold.ttf
  #         weight: 700
  #   - family: NotoNaskhArabic
